# Install with `brew install lefthook` (or download binary) then `lefthook install`
# Docs on passing the commit message file into commit-msg via {1}: https://lefthook.dev/configuration/run.html
# Requires: conform - go install github.com/siderolabs/conform/cmd/conform@latest

commit-msg:
  parallel: false
  commands:
    conventional:
      run: conform enforce --commit-msg-file {1}
